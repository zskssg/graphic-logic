name: Publish NPM Package

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # 只匹配语义化版本标签，如 v1.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.*'  # 匹配 alpha 版本
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.*'   # 匹配 beta 版本
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.*'     # 匹配 rc 版本
    

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # 生成来源证明
    # 添加环境变量解决 Node.js 20 弃用警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'
         

      - name: Debug info
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Current directory: $(pwd)"
          ls -la

      - name: Clear npm cache
        run: |
          npm cache clean --force
          rm -rf node_modules
          # 注意：这里删除了 package-lock.json，会导致 npm ci 失败
          # 考虑是否真的需要删除，通常不建议删除 package-lock.json
          # rm -f package-lock.json

      - name: Install dependencies
        run: |
          # 尝试 npm ci，失败时回退到 npm install
          npm ci || (echo "npm ci failed, trying npm install..." && npm install)
      
      - name: Run tests
        run: npm test
      
      - name: Publish to npm
        run: npm publish --access public
        # --access public 表示发布为公共包
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true